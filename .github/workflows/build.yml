name: Build 3DS Homebrew

on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest
    container: devkitpro/devkitarm:latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Extract Project Files via Python
        run: |
          python3 -c "import os, glob, zipfile; zip_files = glob.glob('*.zip'); print('Found zips:', zip_files); zipfile.ZipFile(zip_files[0]).extractall('.')"

      - name: Fix Directory Structure Automatically
        run: |
          # Case 1: If the zip extracted files straight into the root instead of a 'voxelgame' folder
          if [ ! -d "voxelgame" ] && [ -f "Makefile" ]; then
            echo "Moving root files into a temporary structure..."
            mkdir -p voxelgame_tmp
            find . -maxdepth 1 ! -name '.' ! -name '..' ! -name '.github' ! -name 'voxelgame_tmp' ! -name '*.zip' -exec mv {} voxelgame_tmp/ \;
            mv voxelgame_tmp voxelgame
          fi
          
          # Case 2: If 'voxelgame' exists but the contents were nested under another subfolder inside it
          if [ -d "voxelgame/voxelgame" ]; then
            echo "Fixing double nested voxelgame folder..."
            mv voxelgame/voxelgame/* voxelgame/ 2>/dev/null || true
            rmdir voxelgame/voxelgame 2>/dev/null || true
          fi
          
          # Ensure essential folders exist
          mkdir -p voxelgame/source
          mkdir -p voxelgame/data
          mkdir -p voxelgame/romfs
          mkdir -p voxelgame/include

          # If code files were flattened into the main 'voxelgame' folder by the zip utility, move them to source/
          if [ -f "voxelgame/main.c" ]; then
            echo "Flattened files detected. Moving them to source/..."
            find voxelgame -maxdepth 1 -type f \( -name "*.c" -o -name "*.cpp" -o -name "*.h" -o -name "*.vsh" -o -name "*.VSH" -o -name "*.pica" -o -name "*.shlist" \) -exec mv {} voxelgame/source/ \; 2>/dev/null || true
          fi
          
          echo "Final layout check before compilation:"
          ls -R voxelgame

      - name: Build
        run: |
          cd voxelgame
          make

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: voxelgame-build-files
          path: |
            voxelgame/*.3dsx
            voxelgame/*.cia
