name: Build 3DS Homebrew

on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest
    container: devkitpro/devkitarm:latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Extract Project Files via Python
        run: |
          python3 -c "import os, glob, zipfile; zip_files = glob.glob('*.zip'); print('Found zips:', zip_files); zipfile.ZipFile(zip_files[0]).extractall('.')"

      - name: Force Build Directory Structure & Debug Files
        run: |
          if [ ! -d "voxelgame" ] && [ -f "Makefile" ]; then
            mkdir -p voxelgame_tmp
            find . -maxdepth 1 ! -name '.' ! -name '..' ! -name '.github' ! -name 'voxelgame_tmp' ! -name '*.zip' -exec mv {} voxelgame_tmp/ \;
            mv voxelgame_tmp voxelgame
          fi

          cd voxelgame
          
          # Show us EXACTLY what files you uploaded before we move anything
          echo "=== ALL UPLOADED FILES ==="
          find . -type f
          echo "=========================="

          mkdir -p temp_src
          find . -type f \( -name "*.c" -o -name "*.cpp" -o -name "*.h" -o -name "*.vsh" -o -name "*.VSH" -o -name "*.pica" -o -name "*.shlist" \) -exec mv {} temp_src/ \;

          rm -rf source
          mkdir -p source
          mv temp_src/* source/ 2>/dev/null || true
          rm -rf temp_src
          mkdir -p data romfs include

      - name: Build
        run: |
          cd voxelgame
          make

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: voxelgame-build-files
          path: |
            voxelgame/*.3dsx
            voxelgame/*.cia
