name: Build 3DS Homebrew

on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest
    container: devkitpro/devkitarm:latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Extract Project Files via Python
        run: |
          python3 -c "import os, glob, zipfile; zip_files = glob.glob('*.zip'); print('Found zips:', zip_files); zipfile.ZipFile(zip_files[0]).extractall('.')"

      - name: Build
        run: |
          cd voxelgame
          make

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: voxelgame-build-files
          path: |
            voxelgame/*.3dsx
            voxelgame/*.cia
